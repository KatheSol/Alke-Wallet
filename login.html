<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Alke Wallet</title>

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Estilos-->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="header">
            <a href="index.html" class="color-nav">
                <i class="fa-solid fa-circle-left"></i>
                Volver
            </a>
        </div>
        <h1>Alke Wallet</h1>
    </header>
    <main>
        <div class="main-login">
            <div class="form mb-5 div-login">
                <h2>Login</h2>
                <form id="formLogin" >
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Usuario(Rut)</label>
                        <input type="text" class="form-control" name="rut" id="rut">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" name="password" id="password">
                    </div>
                    <div id="mensaje"></div>
                    <div>
                        <button type="submit" class="btn btn-primary mt-3" >Iniciar Sesión</button>
                        <a class="registrate" href="registroUser.html">Registrate aquí</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer>
        <p>2026 Alke Wallet</p>
    </footer>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
